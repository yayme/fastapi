<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List (FastAPI)</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; }
        input, button { margin: 0.5em 0; }
        ul { padding-left: 1.2em; }
    </style>
</head>
<body>
    <h2>To-Do List</h2>
    <form id="addForm">
        <input id="name" placeholder="Task name" required />
        <input id="deadline" placeholder="Deadline" required />
        <button type="submit">Add Task</button>
    </form>
    <ul id="tasks"></ul>
    <script>
        const api = 'http://127.0.0.1:8000/tasks/';
        const tasksUl = document.getElementById('tasks');
        const addForm = document.getElementById('addForm');
        function fetchTasks() {
            fetch(api)
                .then(r => r.json())
                .then(tasks => {
                    tasksUl.innerHTML = '';
                    tasks.forEach(task => {
                        const li = document.createElement('li');
                        li.textContent = `${task.name} (Deadline: ${task.deadline})`;
                        tasksUl.appendChild(li);
                    });
                });
        }
        addForm.onsubmit = function(e) {
            e.preventDefault();
            fetch(api, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name.value, deadline: deadline.value })
            })
            .then(() => {
                name.value = '';
                deadline.value = '';
                fetchTasks();
            });
        };
        fetchTasks();
    </script>
</body>
</html>
